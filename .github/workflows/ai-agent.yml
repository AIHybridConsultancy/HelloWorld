name: "AI Dev Agent: Gemini 2.0 Flash-Lite"

on:
  issues:
    types: [opened, labeled] 
  workflow_dispatch:        # This is the "Magic Button" for existing issues
    inputs:
      issue_number:
        description: 'The Issue # to work on'
        required: true

jobs:
  coding:
    # Trigger if it has the 'ai-agent' label OR if you run it manually
    if: contains(github.event.issue.labels.*.name, 'ai-agent') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Code with Gemini
        id: gemini
        run: |
          # Detect if manual or automatic
          ISSUE_NUM=${{ github.event.inputs.issue_number || github.event.issue.number }}
          echo "Processing Issue #$ISSUE_NUM"
          
          # Call Gemini API
          RESPONSE=$(curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{
              "contents": [{
                "parts":[{"text": "Context: Senior Dev. Task: Implement feature for Issue #'$ISSUE_NUM'. Output ONLY the raw code for index.html."}]
              }]
            }')
          
          # Extract and save code
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > index.html

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: automated code for issue #${{ github.event.inputs.issue_number || github.event.issue.number }}"
          title: "🤖 AI Fix: Issue #${{ github.event.inputs.issue_number || github.event.issue.number }}"
          branch: "ai-task-${{ github.event.inputs.issue_number || github.event.issue.number }}"
